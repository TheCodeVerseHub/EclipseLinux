set timeout=10
set default=0

insmod all_video

menuentry "Eclipse Linux (live)" {
    linux /boot/vmlinuz rdinit=/sbin/dynamod-init dynamod.live=1 dynamod.media=/dev/sr0 dynamod.squashfs=/live/root.squashfs rootwait console=tty0 console=ttyS0,115200
    initrd /boot/initramfs.gz
}

menuentry "Eclipse Linux (live, serial console)" {
    linux /boot/vmlinuz rdinit=/sbin/dynamod-init dynamod.live=1 dynamod.media=/dev/sr0 dynamod.squashfs=/live/root.squashfs rootwait console=ttyS0,115200
    initrd /boot/initramfs.gz
}

menuentry "Eclipse Linux (live, verbose)" {
    linux /boot/vmlinuz rdinit=/sbin/dynamod-init dynamod.live=1 dynamod.media=/dev/sr0 dynamod.squashfs=/live/root.squashfs rootwait console=tty0 console=ttyS0,115200 earlyprintk=ttyS0
    initrd /boot/initramfs.gz
}
